<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SETO PLANET Beta Waitlist</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2f6f3e; /* 🌲 초록 배경 */
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .container {
      text-align: center;
      padding: 24px;
    }

    img {
      width: 180px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    p {
      opacity: 0.9;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 999px;
      background: white;
      color: #2f6f3e;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      opacity: 0.9;
    }

    .footnote {
      margin-top: 16px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- 🌲 캐릭터 이미지 -->
    <img src="./seto_001.png" alt="Seto Planet Character" />

    <h1>SETO PLANET</h1>

    <p>
      세토 플래닛 초기 플레이어를 모집합니다.<br/>
      We are recruiting early players for SETO PLANET.
    </p>

    <a href="git commit -m "add character image + green theme"
    " target="_blank">
      베타 신청하기 / Join the Beta
    </a>

    <div class="footnote">
      선정된 분들께 테스트 링크를 이메일로 안내드립니다.<br/>
      Selected participants will receive the beta access link via email.
    </div>

  </div>
</body>
</html>
