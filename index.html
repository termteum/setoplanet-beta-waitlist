<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SETO PLANET Beta Waitlist</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #3d8b4e, #1e4d2b);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .container {
      text-align: center;
      padding: 30px;
    }

    img {
      width: 180px;
      margin-bottom: 20px;
      /* filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.28)); */
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-12px);
      }
      100% {
        transform: translateY(0px);
      }
    }

    h1 {
      font-size: 2.5rem;
      margin-top: 5px;
      margin-bottom: 12px;
    }

    .catchphrase {
      margin-top: 10px;
      margin-bottom: 5px;
      font-size: 0.8rem;
      opacity: 1;
    }

    p {
      opacity: 0.9;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 999px;
      background: white;
      color: #2f6f3e;
      text-decoration: none;
      font-weight: bold;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    a:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .footnote {
      margin-top: 40px;
      font-size: 0.7rem;
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="./seto_002.png" alt="Seto Planet Character" />

    <h1>SETO PLANET</h1>

    <p>
      세토 플래닛 초기 플레이어를 모집하고 있어요<br />
      We are recruiting early players for SETO PLANET.
    </p>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeVx-MQav1Bf6Yb-hGUvpCvNW260G1CPLoBt4Z0JLqUFrMD0A/viewform?usp=header" target="_blank">
      베타 신청하고 싶어요 / Join the Beta
    </a>
    <!-- <div class="catchphrase">
        not dopamine, just serotonin
      </div> -->
    <div class="footnote">
        궁금한 점이나 문제가 있다면 help@setoplanet.com으로 편하게 알려주세요
    </div>
  </div>
</body>
</html>
