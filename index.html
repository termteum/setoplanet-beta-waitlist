<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SETO PLANET Beta Waitlist</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, #1b2447 0%, #0b1020 45%, #050814 100%);
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      text-align: center;
      padding: 56px 32px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .eyebrow {
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.72;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 7vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 20px auto 0;
      max-width: 520px;
      font-size: 1rem;
      line-height: 1.7;
      opacity: 0.9;
    }

    .cta {
      display: inline-block;
      margin-top: 32px;
      padding: 15px 28px;
      border-radius: 999px;
      background: #ffffff;
      color: #0b1020;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .cta:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .footnote {
      margin-top: 18px;
      font-size: 0.92rem;
      opacity: 0.68;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Beta Waitlist</div>
    <h1>SETO PLANET</h1>

    <p class="subtitle">
      세토 플래닛 초기 플레이어를 모집합니다.<br />
      We are recruiting early players for SETO PLANET.
    </p>

    <a
      class="cta"
      href="https://forms.gle/FK2ASPgAjEzcw3KE7"
      target="_blank"
      rel="noopener noreferrer"
    >
      베타 신청하기 / Join the Beta
    </a>

    <p class="footnote">
      선정된 분들께 테스트 링크를 이메일로 안내드립니다.<br />
      Selected participants will receive the beta access link via email.
    </p>
  </main>
</body>
</html>
